// ===== HELPERS =====
function hasValue(v) {
  if (!v) return false;
  if (Array.isArray(v)) return v.length > 0;
  if (typeof v === 'object') return v.min !== '' || v.max !== '';
  return typeof v === 'string' && v.trim() !== '';
}
function countCat(page, cat, state) {
  return (PAGE_CONFIG[page].filters[cat] || []).filter(f => hasValue(state[f.id])).length;
}
function totalActive(page, state) {
  return Object.values(PAGE_CONFIG[page].filters).flat().filter(f => hasValue(state[f.id])).length;
}

// ===== ① Select (担当部署 etc.) =====
// 実際のソース: MuiSelect-root, 複数選択はChipタグで表示
function MultiSelectControl({ f, state, setState }) {
  const selected = state[f.id] || [];

  const handleChange = (e) => {
    const val = e.target.value;
    setState(s => ({ ...s, [f.id]: typeof val === 'string' ? val.split(',') : val }));
  };
  const removeChip = (opt) => {
    setState(s => ({ ...s, [f.id]: (s[f.id] || []).filter(v => v !== opt) }));
  };
  const clear = () => setState(s => ({ ...s, [f.id]: [] }));

  return (
    <FormControl fullWidth size="small">
      <InputLabel sx={{ fontSize:13 }}>{f.label}を選択</InputLabel>
      <Select
        multiple
        value={selected}
        onChange={handleChange}
        label={`${f.label}を選択`}
        renderValue={(vals) => (
          <Box sx={{ display:'flex', flexWrap:'wrap', gap:0.5, pr: selected.length > 0 ? 3.5 : 0 }}>
            {vals.map(v => (
              <Chip
                key={v}
                label={v}
                size="small"
                onDelete={() => removeChip(v)}
                onMouseDown={e => e.stopPropagation()}
                sx={{ fontSize:11, height:22 }}
              />
            ))}
          </Box>
        )}
        // × アイコンをフォーム内右端に表示（▼の左隣）
        endAdornment={
          selected.length > 0 ? (
            <InputAdornment position="end" sx={{ mr: 2.5 }}>
              <IconButton
                size="small"
                onMouseDown={e => e.preventDefault()}
                onClick={e => { e.stopPropagation(); clear(); }}
                sx={{ color:'text.disabled', p:0.25 }}
              >
                <span className="material-icons" style={{ fontSize:18 }}>close</span>
              </IconButton>
            </InputAdornment>
          ) : null
        }
        sx={{ fontSize:13, minHeight:40 }}
        MenuProps={{ PaperProps:{ sx:{ maxHeight:220 } } }}
      >
        {f.options.map(opt => (
          <MenuItem
            key={opt}
            value={opt}
            sx={{
              fontSize:13,
              fontWeight: selected.includes(opt) ? 500 : 400,
              color: selected.includes(opt) ? 'primary.main' : 'text.primary',
              bgcolor: selected.includes(opt) ? 'rgba(45,107,94,0.08)' : 'transparent',
              '&:hover': {
                bgcolor: selected.includes(opt) ? 'rgba(45,107,94,0.14)' : 'action.hover',
              },
              '&.Mui-selected': { bgcolor:'rgba(45,107,94,0.08)' },
              '&.Mui-selected:hover': { bgcolor:'rgba(45,107,94,0.14)' },
            }}
          >
            {opt}
          </MenuItem>
        ))}
      </Select>
    </FormControl>
  );
}

// ===== ① Autocomplete (タグ etc.) =====
// 実際のソース: MuiAutocomplete-root
function AutocompleteControl({ f, state, setState }) {
  const selected = state[f.id] || [];
  const clear = () => setState(s => ({ ...s, [f.id]: [] }));

  return (
    <Autocomplete
      multiple
      fullWidth
      size="small"
      options={f.options}
      value={selected}
      onChange={(_, val) => setState(s => ({ ...s, [f.id]: val }))}
      // × アイコンをフォーム内に表示（MUI Autocomplete のデフォルト clearIcon を上書き）
      clearIcon={<span className="material-icons" style={{ fontSize:18 }}>close</span>}
      clearText="クリア"
      renderInput={params => (
        <TextField {...params} label={`${f.label}を選択`} sx={{ fontSize:13 }} />
      )}
      renderTags={(vals, getTagProps) =>
        vals.map((v, i) => (
          <Chip
            key={v}
            label={v}
            size="small"
            {...getTagProps({ index: i })}
            sx={{ fontSize:11, height:22 }}
          />
        ))
      }
      renderOption={(props, opt, { selected: isSel }) => (
        <li
          {...props}
          style={{
            fontSize: 13,
            fontWeight: isSel ? 500 : 400,
            color: isSel ? '#2d6b5e' : 'inherit',
            backgroundColor: isSel ? 'rgba(45,107,94,0.08)' : 'transparent',
          }}
        >
          {opt}
        </li>
      )}
      sx={{ '& .MuiInputBase-root': { minHeight:40, fontSize:13 } }}
    />
  );
}

// 実際のソース: MuiTextField-root, label="キーワード検索"
function KeywordControl({ f, state, setState }) {
  const val = state[f.id] || '';
  const set = v => setState(s => ({ ...s, [f.id]: v }));
  return (
    <TextField
      fullWidth
      size="small"
      placeholder="キーワード検索"
      value={val}
      onChange={e => set(e.target.value)}
      InputProps={{
        endAdornment: val ? (
          <InputAdornment position="end">
            <IconButton
              size="small"
              onMouseDown={e => e.preventDefault()}
              onClick={() => set('')}
              sx={{ color:'text.disabled', p:0.25 }}
            >
              <span className="material-icons" style={{ fontSize:18 }}>close</span>
            </IconButton>
          </InputAdornment>
        ) : null,
      }}
      sx={{ fontSize:13, '& .MuiInputBase-input':{ fontSize:13 } }}
    />
  );
}

// ===== ② Checkbox group =====
// 実際のソース: FormControlLabel + Checkbox 横並び
function CheckboxGroupControl({ f, state, setState }) {
  const selected = state[f.id] || [];
  const toggle = (v, checked) => {
    setState(s => ({
      ...s,
      [f.id]: checked ? [...(s[f.id]||[]), v] : (s[f.id]||[]).filter(x => x !== v)
    }));
  };
  return (
    <Box sx={{ display:'flex', flexWrap:'wrap' }}>
      {f.options.map(opt => (
        <FormControlLabel
          key={opt.v}
          control={
            <Checkbox
              size="small"
              checked={selected.includes(opt.v)}
              onChange={e => toggle(opt.v, e.target.checked)}
              color="primary"
            />
          }
          label={<Typography variant="body1" sx={{ fontSize:13 }}>{opt.label}</Typography>}
          sx={{ mr:2 }}
        />
      ))}
    </Box>
  );
}

              {opt.label}
            </Typography>
          }
          sx={{ mr:2 }}
        />
      ))}
    </Box>
  );
}


function NumericControl({ f, state, setState }) {
  const val = state[f.id] || { min:'', max:'' };
  const set = (k, v) => setState(s => ({ ...s, [f.id]: { ...val, [k]: v } }));
  const minN = val.min !== '' ? parseFloat(val.min) : null;
  const maxN = val.max !== '' ? parseFloat(val.max) : null;
  const err = minN !== null && maxN !== null && minN > maxN;
  return (
    <Box>
      <Box sx={{ display:'flex', alignItems:'center', gap:1.5 }}>
        <TextField
          size="small"
          type="number"
          placeholder={`最小値（最小${f.min ?? ''}）`}
          value={val.min}
          onChange={e => set('min', e.target.value)}
          error={err}
          inputProps={{ min: f.min, max: f.max }}
          sx={{ flex:1, '& .MuiInputBase-input':{ fontSize:13 } }}
        />
        <Typography variant="body2" color="text.secondary" sx={{ flexShrink:0 }}>〜</Typography>
        <TextField
          size="small"
          type="number"
          placeholder={`最大値（最大${f.max ?? ''}）`}
          value={val.max}
          onChange={e => set('max', e.target.value)}
          error={err}
          inputProps={{ min: f.min, max: f.max }}
          sx={{ flex:1, '& .MuiInputBase-input':{ fontSize:13 } }}
        />
      </Box>
      {err && (
        <Typography variant="caption" color="error" sx={{ mt:0.5, display:'block' }}>
          最小値は最大値以下にしてください
        </Typography>
      )}
    </Box>
  );
}

// ===== FILTER ROW (実際のソース: css-1pg09qg 構造) =====
// 実際: ラベル行(上) → コントロール行(下) の縦積み、行間に Divider
function FilterRow({ f, state, setState }) {
  let Control = null;
  if (f.type === 'multiselect-select') Control = <MultiSelectControl  f={f} state={state} setState={setState} />;
  if (f.type === 'multiselect-auto')   Control = <AutocompleteControl f={f} state={state} setState={setState} />;
  if (f.type === 'keyword')            Control = <KeywordControl      f={f} state={state} setState={setState} />;
  if (f.type === 'checkbox')           Control = <CheckboxGroupControl f={f} state={state} setState={setState} />;
  if (f.type === 'checkbox-color')     Control = <CheckboxColorControl f={f} state={state} setState={setState} />;
  if (f.type === 'numeric')            Control = <NumericControl      f={f} state={state} setState={setState} />;

  return (
    // css-1pg09qg 相当: 縦積みレイアウト
    <Box sx={{ display:'flex', flexDirection:'column', gap:0.75, py:1.5, px:0 }}>
      <FilterLabel label={f.label} note={f.note} />
      <Box>{Control}</Box>
    </Box>
  );
}

// ===== MAIN APP =====
function App() {
  const [page, setPage] = React.useState('CSA');
  const [open, setOpen] = React.useState(false);
  const [cat, setCat] = React.useState('指標・設問');
  const [state, setState] = React.useState({});
  const [applied, setApplied] = React.useState({ count:0, shown:120, total:120 });

  const cfg = PAGE_CONFIG[page];

  const handlePageChange = (p) => {
    setPage(p);
    setCat(PAGE_CONFIG[p].categories[0]);
    setState({});
    setApplied({ count:0, shown:120, total:120 });
  };

  const handleOpen  = () => { setCat(cfg.categories[0]); setOpen(true); };
  const handleClose = () => setOpen(false);
  const handleReset = () => setState({});
  const handleApply = () => {
    const n = totalActive(page, state);
    const shown = n > 0 ? Math.max(1, Math.floor(120 * (1 - n * 0.08))) : 120;
    setApplied({ count:n, shown, total:120 });
    setOpen(false);
  };

  const catCount = c => countCat(page, c, state);
  const filters  = cfg.filters[cat] || [];
  const anyActive = totalActive(page, state) > 0;

  return (
    <ThemeProvider theme={theme}>
      {/* ── デモノート ── */}
      <Paper variant="outlined" sx={{ width:'100%', maxWidth:1100, px:2, py:1 }}>
        <Typography variant="caption" color="text.secondary">
          📋 デモ画面 — ページを選択し「絞り込み」ボタンをクリックするとダイアログが開きます
        </Typography>
      </Paper>

      {/* ── ページタブ ── */}
      <Paper variant="outlined" sx={{ width:'100%', maxWidth:1100, px:2, py:1, display:'flex', gap:1 }}>
        {['CSA','FTSE','MSCI','SSBJ','Cross'].map(p => (
          <Button
            key={p}
            variant={page === p ? 'contained' : 'text'}
            size="small"
            onClick={() => handlePageChange(p)}
            disableElevation
            sx={{ minWidth:72 }}
          >
            {p}
          </Button>
        ))}
      </Paper>

      {/* ── ステータスバー ── */}
      <Paper variant="outlined" sx={{ width:'100%', maxWidth:1100, px:2, py:1.25, display:'flex', alignItems:'center', gap:2 }}>
        <Button
          variant="outlined"
          size="small"
          startIcon={<span className="material-icons" style={{ fontSize:16 }}>tune</span>}
          onClick={handleOpen}
          color={applied.count > 0 ? 'primary' : 'inherit'}
          sx={{ borderColor: applied.count > 0 ? 'primary.main' : 'rgba(0,0,0,0.23)', flexShrink:0 }}
        >
          絞り込み
        </Button>
        <Typography variant="body2" color={applied.count > 0 ? 'primary.main' : 'text.secondary'}>
          {applied.count > 0
            ? `${applied.count}項目で絞り込み中（${applied.shown} / ${applied.total}件）`
            : `全${applied.total}件`}
        </Typography>
      </Paper>

      {/* ── DIALOG ── */}
      <Dialog
        open={open}
        onClose={handleClose}
        maxWidth={false}
        PaperProps={{
          sx: {
            width: 900,
            height: 600,
            maxWidth: 'calc(100vw - 32px)',
            maxHeight: 'calc(100vh - 32px)',
            display: 'flex',
            flexDirection: 'column',
            overflow: 'hidden',
          }
        }}
      >
        {/* Title — 実際のソース: MuiDialogTitle */}
        <DialogTitle sx={{ borderBottom:'1px solid', borderColor:'divider', py:1.5, px:3, flexShrink:0 }}>
          <Box sx={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <Typography variant="h6" sx={{ fontWeight:600, fontSize:16 }}>絞り込み</Typography>
            <Typography variant="body2" sx={{ fontSize:14, color:'text.secondary', flexShrink:0 }}>
              {'適用中のフィルター: '}
              <Box component="span" sx={{ fontSize:18, fontWeight:700, color:'text.primary' }}>
                {totalActive(page, state)}
              </Box>
            </Typography>
          </Box>
        </DialogTitle>

        {/* Body: サイドナビ + コンテンツ */}
        <Box sx={{ display:'flex', flex:1, minHeight:0, overflow:'hidden' }}>

          {/* ── 左サイドナビ (PRD要件: カテゴリ切替) ── */}
          <Box
            sx={{
              width:176, flexShrink:0,
              borderRight:'1px solid', borderColor:'divider',
              overflowY:'auto',
              display:'flex', flexDirection:'column',
              pt:1,
            }}
          >
            <List dense disablePadding>
              {cfg.categories.map(c => {
                const n = catCount(c);
                return (
                  <ListItemButton
                    key={c}
                    selected={c === cat}
                    onClick={() => setCat(c)}
                    sx={{
                      py:1.5, px:2,
                      '&.Mui-selected': {
                        bgcolor:'#e2edea',
                        color:'text.primary',
                      },
                      '&.Mui-selected:hover': { bgcolor:'rgba(45,107,94,0.12)' },
                    }}
                  >
                    <ListItemText
                      disableTypography
                      primary={
                        <Box sx={{ display:'flex', alignItems:'center', gap:0.75 }}>
                          <Typography sx={{ fontSize:13, fontWeight: c === cat ? 500 : 400, color:'rgba(0,0,0,0.6)' }}>
                            {n > 0 ? `${c} (${n})` : c}
                          </Typography>
                          {n > 0 && (
                            <Box sx={{ width:8, height:8, bgcolor:'#ed6c02', borderRadius:'50%', flexShrink:0 }} />
                          )}
                        </Box>
                      }
                    />
                    <span className="material-icons" style={{ fontSize:20, color:'rgba(0,0,0,0.54)' }}>chevron_right</span>
                  </ListItemButton>
                );
              })}
            </List>
          </Box>

          {/* ── 右コンテンツ (実際のソース: MuiDialogContent 相当) ── */}
          <Box
            sx={{
              flex:1, overflowY:'auto',
              px:3, py:0,
              // 実際のソース: MuiDialogContent-root
            }}
          >
            {filters.map((f, i) => (
              <React.Fragment key={f.id}>
                <FilterRow f={f} state={state} setState={setState} />
                {i < filters.length - 1 && <Divider />}
              </React.Fragment>
            ))}
            {/* 実際のソース末尾の Divider */}
            <Divider />
          </Box>
        </Box>

        {/* ── Actions (実際のソース: css-xl4c5t / css-lgk7oi 構造) ── */}
        <DialogActions
          sx={{
            borderTop:'1px solid', borderColor:'divider',
            px:3, py:1.5, flexShrink:0,
            // 実際のソース: justify-content: space-between に相当
            '&.MuiDialogActions-root': { justifyContent:'space-between' },
            justifyContent:'space-between',
          }}
        >
          {/* 左: キャンセル (実際: MuiButton-textError) */}
          <Box>
            <Button
              color="error"
              onClick={handleClose}
              sx={{ fontWeight:400 }}
            >
              キャンセル
            </Button>
          </Box>

          {/* 右: リセット + 絞り込みを適用 (実際: css-lgk7oi) */}
          <Box sx={{ display:'flex', gap:1 }}>
            {/* 実際のソース: MuiButton-textPrimary */}
            <Button
              color="primary"
              onClick={handleReset}
              disabled={!anyActive}
            >
              リセット
            </Button>
            {/* 実際のソース: MuiButton-containedPrimary */}
            <Button
              variant="contained"
              color="primary"
              disableElevation
              onClick={handleApply}
            >
              絞り込みを適用
            </Button>
          </Box>
        </DialogActions>
      </Dialog>
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
